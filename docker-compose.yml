services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mailer
      POSTGRES_PASSWORD: mailer
      POSTGRES_DB: mailer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailer"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://mailer:mailer@db:5432/mailer
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://localhost:8000
      OAUTHLIB_INSECURE_TRANSPORT: "1"
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A app.workers.tasks:celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://mailer:mailer@db:5432/mailer
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://localhost:8000
      OAUTHLIB_INSECURE_TRANSPORT: "1"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
